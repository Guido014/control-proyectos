<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Proyectos | CONE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cone-red: #E30613; /* Rojo institucional CONE */
            --cone-black: #1A1A1A;
            --cone-light-gray: #F4F4F4;
            --cone-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Comfortaa', cursive, sans-serif;
            background-color: var(--cone-light-gray);
            color: var(--cone-black);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* LOGO DE FONDO (MARCA DE AGUA) */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; 
            height: 60%;
            background-image: url('Logo-03 - Copy.png'); /* Asegúrate de que el nombre coincida */
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.05; /* Sutil para no estorbar la lectura */
            z-index: -1;
            pointer-events: none;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* HEADER DINÁMICO */
        .header {
            background: var(--cone-white);
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 5px solid var(--cone-red);
        }

        .brand-subtitle {
            color: var(--cone-red);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .header h1 { 
            font-size: 2rem; 
            font-weight: 700;
            color: var(--cone-black);
        }

        /* STATUS DE SINCRONIZACIÓN */
        #statusWrapper {
            overflow: hidden;
            transition: all 0.5s ease;
            height: 0px; 
            opacity: 0;
        }
        .sync-status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            font-weight: 700;
        }
        .sync-status.connected { background: #d4edda; color: #155724; }
        .sync-status.syncing { background: #fff3cd; color: #856404; }

        .refresh-btn {
            position: absolute;
            right: 20px;
            top: 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.4;
            transition: 0.3s;
        }
        .refresh-btn:hover { opacity: 1; color: var(--cone-red); }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: var(--cone-white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 25px;
            border-left: 5px solid var(--cone-red);
            padding-left: 15px;
            text-transform: uppercase;
        }

        /* FORMULARIO */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: #555; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--cone-red); outline: none; }

        /* ELIMINAR FLECHAS DE NÚMERO */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .btn {
            background: var(--cone-red);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { background: var(--cone-black); transform: translateY(-2px); }

        /* ESTADÍSTICAS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: var(--cone-black);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 4px solid var(--cone-red);
        }
        .stat-card h3 { font-size: 1.5rem; margin-bottom: 2px; }
        .stat-card p { font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; }

        .filters {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        /* LISTADO */
        .records-list { max-height: 500px; overflow-y: auto; }
        .record-item {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 5px solid var(--cone-red);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .record-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 5px; }
        .record-hours { background: var(--cone-black); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; }
        .record-info { font-size: 0.8rem; color: #666; line-height: 1.4; }

        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="brand-subtitle">CONSULTORA DE NEGOCIOS EMPRESARIOS</span> 
        <h1>Control de Proyectos</h1>
        <button onclick="loadRecords()" class="refresh-btn">🔄</button>
        <div id="statusWrapper">
            <div id="syncStatus" class="sync-status">🔄 Sincronizando...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h2>➕ Registrar Horas</h2>
            <form id="timeForm">
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>Cliente</label>
                    <select id="client" required>
                        <option value="">Seleccionar...</option>
                        <option value="ROSSI">ROSSI</option>
                        <option value="NIP">NIP</option>
                        <option value="BROUWER">BROUWER</option>
                        <option value="FONTANELLA">FONTANELLA</option>
                        <option value="PYP">PYP</option>
                        <option value="LABORATORIOS ARRAYANES">LABORATORIOS ARRAYANES</option>
                        <option value="FRIOPACK">FRIOPACK</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Horas</label>
                    <input type="number" id="hours" step="0.5" required placeholder="0.0">
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="type">
                        <option value="Remoto">🏠 Remoto</option>
                        <option value="Presencial">🏢 Presencial</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Solicitante</label>
                    <input type="text" id="requester" placeholder="Ej: Santiago Avalle">
                </div>
                <div class="form-group">
                    <label>Descripción Facturación</label>
                    <input type="text" id="billingDesc" placeholder="Detalle del trabajo...">
                </div>
                <button type="submit" class="btn" id="submitBtn">💾 Guardar Registro</button>
            </form>
        </div>

        <div class="card">
            <h2>📈 Resumen</h2>
            <div class="stats-grid">
                <div class="stat-card"><h3 id="totalHours">0.0</h3><p>Horas</p></div>
                <div class="stat-card"><h3 id="totalClients">0</h3><p>Clientes</p></div>
                <div class="stat-card"><h3 id="totalRecords">0</h3><p>Registros</p></div>
            </div>

            <div class="filters">
                <select id="filterYear">
                    <option value="2026" selected>2026</option>
                    <option value="2025">2025</option>
                </select>
                <select id="filterMonth">
                    <option value="">Todos</option>
                    <option value="01">Enero</option>
                    <option value="02">Febrero</option>
                </select>
                <select id="filterClient">
                    <option value="">Clientes</option>
                </select>
            </div>

            <div id="recordsList" class="records-list"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNF5pO9cw_Qpn3JeqUz1gH5xjDMuTJygJMekP2QI_cYU10BA65_9xnXxdzEjsuU-23/exec'; 
    let timeRecords = [];

    async function loadRecords() {
        const statusLabel = document.getElementById('syncStatus');
        const statusWrapper = document.getElementById('statusWrapper');
        statusWrapper.style.height = '40px';
        statusWrapper.style.opacity = '1';

        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            if (Array.isArray(data)) {
                timeRecords = data;
                populateClientFilter();
                renderRecords();
                statusLabel.innerText = '✅ Sincronizado';
                statusLabel.className = 'sync-status connected';
                setTimeout(() => {
                    statusWrapper.style.height = '0px';
                    statusWrapper.style.opacity = '0';
                }, 2000);
            }
        } catch (e) {
            statusLabel.innerText = '❌ Error de red';
        }
    }

    function renderRecords() {
        const container = document.getElementById('recordsList');
        const fYear = document.getElementById('filterYear').value;
        const fMonth = document.getElementById('filterMonth').value;
        const fClient = document.getElementById('filterClient').value;

        const filtered = timeRecords.filter(r => {
            const rDate = String(r.fecha);
            return (!fYear || rDate.includes(fYear)) &&
                   (!fMonth || rDate.includes("-" + fMonth + "-")) &&
                   (!fClient || r.cliente === fClient);
        });

        document.getElementById('totalHours').innerText = filtered.reduce((acc, r) => acc + (parseFloat(r.horas) || 0), 0).toFixed(1);
        document.getElementById('totalClients').innerText = new Set(filtered.map(r => r.cliente)).size;
        document.getElementById('totalRecords').innerText = filtered.length;

        container.innerHTML = filtered.map(r => `
            <div class="record-item">
                <div class="record-header">
                    <span>${r.cliente}</span>
                    <span class="record-hours">${r.horas}h</span>
                </div>
                <div class="record-info">
                    📅 ${r.fecha.split('T')[0]} | 👤 ${r.solicitante || '---'}<br>
                    📝 ${r.descripcion || ''}
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#999;">Sin registros</p>';
    }

    function populateClientFilter() {
        const clients = [...new Set(timeRecords.map(r => r.cliente))].filter(Boolean).sort();
        const select = document.getElementById('filterClient');
        select.innerHTML = '<option value="">Clientes</option>' + 
            clients.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    document.getElementById('timeForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = '⏳ Guardando...';

        const data = {
            date: document.getElementById('date').value,
            client: document.getElementById('client').value,
            hours: document.getElementById('hours').value,
            type: document.getElementById('type').value,
            requester: document.getElementById('requester').value,
            description: document.getElementById('billingDesc').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            this.reset();
            document.getElementById('date').valueAsDate = new Date();
            await loadRecords();
        } catch (e) { alert("Error al guardar"); }
        btn.disabled = false; btn.innerText = '💾 Guardar Registro';
    };

    document.getElementById('filterYear').onchange = renderRecords;
    document.getElementById('filterMonth').onchange = renderRecords;
    document.getElementById('filterClient').onchange = renderRecords;

    document.getElementById('date').valueAsDate = new Date();
    loadRecords();
</script>

</body>
</html>
