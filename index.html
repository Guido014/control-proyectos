<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Control Proyectos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .record { border-bottom: 1px solid #ddd; padding: 10px; }
        .total { font-size: 24px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Horas Totales: <span id="totalH">0</span></h1>
        <select id="fYear" onchange="render()"><option value="2026">2026</option><option value="2025">2025</option></select>
        <div id="status">Cargando...</div>
    </div>
    <div class="card" id="lista"></div>

    <script>
        // PEGA TU URL AQUÍ ABAJO
        const URL = 'https://script.google.com/macros/s/AKfycbx6Ke0I9cKWwamrSUuI9Q2s8VgZZjRUMV9KJXBtBp_TmAxhrvAIOKcg4FZNAlw3Gpmz/exec'; 
        let datos = [];

        async function cargar() {
            try {
                const res = await fetch(URL);
                datos = await res.json();
                document.getElementById('status').innerText = 'Conectado: ' + datos.length + ' registros';
                render();
            } catch (e) {
                document.getElementById('status').innerText = 'Error de conexión';
            }
        }

        function render() {
            const year = document.getElementById('fYear').value;
            const lista = document.getElementById('lista');
            
            const filtrados = datos.filter(d => String(d.fecha).includes(year));
            
            let suma = 0;
            lista.innerHTML = filtrados.map(d => {
                suma += parseFloat(d.horas);
                return `<div class="record">
                    <strong>${d.cliente || 'Sin Nombre'}</strong>: ${d.horas}h <br>
                    <small>${d.fecha} | ${d.tipo}</small>
                </div>`;
            }).join('') || 'No hay datos para este año';
            
            document.getElementById('totalH').innerText = suma;
        }

        cargar();
    </script>
</body>
</html>
