<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Proyectos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 { color: #333; font-size: 2em; margin-bottom: 10px; }
        .sync-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .sync-status.connected { background: #d4edda; color: #155724; }
        .sync-status.syncing { background: #fff3cd; color: #856404; }
        .sync-status.error { background: #f8d7da; color: #721c24; }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        /* Estilo para los contadores */
        .char-count {
            display: block;
            text-align: right;
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h3 { font-size: 1.8em; }
        .filters {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .records-list { max-height: 500px; overflow-y: auto; }
        .record-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .record-item-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #333;
        }
        .record-hours { background: #667eea; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.85em; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        
        @media (max-width: 768px) {
            .main-content, .stats-grid, .filters { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Control de Proyectos</h1>
            <div id="syncStatus" class="sync-status syncing">🔄 Conectando con Google Sheets...</div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>➕ Registrar Horas</h2>
                <form id="timeForm">
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Cliente</label>
                        <select id="client" required>
                            <option value="">Seleccionar cliente...</option>
                            <option value="ROSSI">ROSSI</option>
                            <option value="NIP">NIP</option>
                            <option value="BROUWER">BROUWER</option>
                            <option value="FONTANELLA">FONTANELLA</option>
			    <option value="PYP">PYP</option>
			    <option value="LABORATORIOS ARRAYANES">LABORATORIOS ARRAYANES</option>
			    <option value="FRIOPACK">FRIOPACK</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Horas</label>
                        <input type="number" id="hours" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="type">
                            <option value="Remoto">🏠 Remoto</option>
                            <option value="Presencial">🏢 Presencial</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Solicitante</label>
                        <input type="text" id="requester" maxlength="50" placeholder="Ej. Santiago Avalle" oninput="updateReqCount()">
                        <span class="char-count" id="reqCountDisplay">0 / 50</span>
                    </div>

                    <div class="form-group">
                        <label>Descripción para Facturación</label>
                        <input type="text" id="billingDesc" maxlength="50" placeholder="Ej. Ajustes finales..." oninput="updateDescCount()">
                        <span class="char-count" id="descCountDisplay">0 / 50</span>
                    </div>

                    <button type="submit" class="btn" id="submitBtn">💾 Guardar Registro</button>
                </form>
            </div>

            <div class="card">
                <h2>📈 Resumen y Filtros</h2>
                <div class="stats-grid">
                    <div class="stat-card"><h3 id="totalHours">0.0</h3><p>Horas</p></div>
                    <div class="stat-card"><h3 id="totalClients">0</h3><p>Clientes</p></div>
                    <div class="stat-card"><h3 id="totalRecords">0</h3><p>Registros</p></div>
                </div>

                <div class="filters">
                    <select id="filterYear">
                        <option value="2026" selected>2026</option>
                        <option value="2025">2025</option>
                    </select>
                    <select id="filterMonth">
                        <option value="">Todos los meses</option>
                        <option value="01">Enero</option>
                        <option value="02">Febrero</option>
                        <option value="03">Marzo</option>
                    </select>
                    <select id="filterClient">
                        <option value="">Todos los clientes</option>
                    </select>
                </div>

                <div id="recordsList" class="records-list"></div>
            </div>
        </div>
    </div>

    <script>
        // MANTÉN TU URL DE SIEMPRE AQUÍ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNF5pO9cw_Qpn3JeqUz1gH5xjDMuTJygJMekP2QI_cYU10BA65_9xnXxdzEjsuU-23/exec'; 
        let timeRecords = [];

        // Contadores de caracteres
        function updateReqCount() {
            const val = document.getElementById('requester').value.length;
            document.getElementById('reqCountDisplay').innerText = `${val} / 50`;
        }
        function updateDescCount() {
            const val = document.getElementById('billingDesc').value.length;
            document.getElementById('descCountDisplay').innerText = `${val} / 50`;
        }

        async function loadRecords() {
            try {
                const response = await fetch(SCRIPT_URL);
                timeRecords = await response.json();
                
                document.getElementById('syncStatus').className = 'sync-status connected';
                document.getElementById('syncStatus').innerText = '✅ Sincronizado con Google Sheets';
                
                populateClientFilter();
                renderRecords();
            } catch (error) {
                document.getElementById('syncStatus').className = 'sync-status error';
                document.getElementById('syncStatus').innerText = '❌ Error de conexión';
            }
        }

        function renderRecords() {
            const container = document.getElementById('recordsList');
            const fYear = document.getElementById('filterYear').value;
            const fMonth = document.getElementById('filterMonth').value;
            const fClient = document.getElementById('filterClient').value;

            let filtered = timeRecords.filter(r => {
                const rDate = String(r.fecha); 
                const matchYear = !fYear || rDate.includes(fYear);
                const matchMonth = !fMonth || rDate.includes("-" + fMonth + "-") || rDate.includes("/" + fMonth + "/");
                const matchClient = !fClient || r.cliente === fClient;
                return matchYear && matchMonth && matchClient;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No hay registros para este filtro</p></div>';
                updateStats(0, 0, 0);
                return;
            }

            container.innerHTML = filtered.map(r => `
                <div class="record-item">
                    <div class="record-item-header">
                        <span class="record-client">${r.cliente || 'Sin nombre'}</span>
                        <span class="record-hours">${r.horas}h</span>
                    </div>
                    <div style="font-size: 0.85em; color: #666; margin-top: 5px;">
                        📅 ${String(r.fecha).split(' ')[0]} | ${r.tipo || '---'}
                        ${r.solicitante ? '<br>👤 ' + r.solicitante : ''}
                        ${r.descripcion ? '<br>📝 ' + r.descripcion : ''}
                    </div>
                </div>
            `).join('');

            const totalH = filtered.reduce((s, r) => s + (parseFloat(r.horas) || 0), 0);
            const totalC = new Set(filtered.map(r => r.cliente)).size;
            updateStats(totalH, totalC, filtered.length);
        }

        function updateStats(h, c, r) {
            document.getElementById('totalHours').innerText = h.toFixed(1);
            document.getElementById('totalClients').innerText = c;
            document.getElementById('totalRecords').innerText = r;
        }

        function populateClientFilter() {
            const clients = [...new Set(timeRecords.map(r => r.cliente))].filter(Boolean);
            const select = document.getElementById('filterClient');
            const current = select.value;
            select.innerHTML = '<option value="">Todos los clientes</option>' + 
                clients.map(c => `<option value="${c}">${c}</option>`).join('');
            select.value = current;
        }

        document.getElementById('timeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = '⏳ Guardando...';

            const data = {
                date: document.getElementById('date').value,
                client: document.getElementById('client').value,
                hours: document.getElementById('hours').value,
                type: document.getElementById('type').value,
                requester: document.getElementById('requester').value, // DATO NUEVO
                description: document.getElementById('billingDesc').value // DATO NUEVO
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                this.reset();
                // Resetear contadores visuales
                document.getElementById('reqCountDisplay').innerText = "0 / 50";
                document.getElementById('descCountDisplay').innerText = "0 / 50";
                
                document.getElementById('date').valueAsDate = new Date();
                await loadRecords();
            } catch (e) {
                alert("Error al guardar");
            } finally {
                btn.disabled = false;
                btn.innerText = '💾 Guardar Registro';
            }
        });

        document.getElementById('filterYear').onchange = renderRecords;
        document.getElementById('filterMonth').onchange = renderRecords;
        document.getElementById('filterClient').onchange = renderRecords;

        document.getElementById('date').valueAsDate = new Date();
        loadRecords();
    </script>
</body>
</html>
