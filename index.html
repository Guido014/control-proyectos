<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONE | Control de Proyectos</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --cone-red: #E30613; --cone-black: #1A1A1A; --cone-light-gray: #F4F4F4; --cone-white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Comfortaa', cursive, sans-serif; background: var(--cone-light-gray); color: var(--cone-black); padding: 15px; font-size: 13px; }
        
        /* LOGIN PERSISTENTE */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--cone-black); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: white; padding: 30px; border-radius: 12px; text-align: center; border-top: 5px solid var(--cone-red); width: 280px; }
        #mainApp { display: none; max-width: 1200px; margin: 0 auto; }

        /* HEADER */
        .header { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; position: relative; border-bottom: 4px solid var(--cone-red); }
        .brand-subtitle { color: var(--cone-red); font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .refresh-btn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.3rem; opacity: 0.4; }

        /* TABS */
        .tabs-header { display: flex; margin-bottom: 12px; border-bottom: 1px solid #eee; }
        .tab-btn { flex: 1; padding: 8px; background: none; border: none; font-family: inherit; font-weight: 700; cursor: pointer; color: #aaa; border-bottom: 2px solid transparent; font-size: 0.65rem; text-transform: uppercase; }
        .tab-btn.active { color: var(--cone-red); border-bottom: 2px solid var(--cone-red); }

        /* LAYOUT */
        .main-content { display: grid; grid-template-columns: 300px 1fr; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); height: fit-content; }
        
        /* FORMULARIOS */
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 3px; font-weight: 700; font-size: 0.6rem; color: #888; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.8rem; outline: none; }
        .manual-input { margin-top: 5px; border-color: var(--cone-red); display: none; }
        .btn { background: var(--cone-red); color: white; padding: 10px; border: none; border-radius: 6px; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; font-size: 0.75rem; transition: 0.2s; }
        .btn:hover { background: var(--cone-black); }

        /* LISTADO */
        .record-item { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--cone-red); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .record-info { flex: 1; }
        .record-client-name { font-weight: 700; font-size: 0.8rem; }
        .record-meta { font-size: 0.65rem; color: #888; }
        .record-desc { font-size: 0.7rem; color: #555; margin-top: 3px; border-top: 1px solid #f9f9f9; padding-top: 3px; }
        .record-side { text-align: right; }
        .record-hours-badge { background: var(--cone-black); color: white; padding: 2px 8px; border-radius: 12px; font-weight: 700; font-size: 0.7rem; }

        /* CALENDARIO */
        .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .cal-header { text-align: center; font-weight: 700; font-size: 0.55rem; color: #ccc; text-transform: uppercase; }
        .cal-day { background: #fcfcfc; border: 1px solid #eee; min-height: 80px; border-radius: 8px; padding: 5px; position: relative; cursor: pointer; }
        .cal-day.today { border: 2px solid var(--cone-red); }
        .cal-num { font-weight: 700; font-size: 0.75rem; color: #ccc; }
        .cal-chip { font-size: 0.5rem; background: #f0f0f0; padding: 1px 3px; border-radius: 3px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid var(--cone-red); display: block; }
        .cal-total-hours { position: absolute; bottom: 4px; right: 4px; font-size: 0.55rem; font-weight: 700; opacity: 0.6; }

        .sync-status { padding: 4px 10px; border-radius: 12px; font-size: 0.65rem; font-weight: 700; background: #eee; margin-top: 5px; display: none; }

        @media (max-width: 850px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color:var(--cone-red);">CONE</h2>
        <input type="password" id="passInput" placeholder="Contraseña..." onkeypress="if(event.key==='Enter') verifyPass()">
        <button onclick="verifyPass()" class="btn" style="margin-top:12px;">Entrar</button>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <span class="brand-subtitle">CONSULTORA DE NEGOCIOS EMPRESARIOS</span> 
        <h1 style="font-size:1.2rem; margin:5px 0;">Control de Proyectos</h1>
        <button onclick="loadData()" class="refresh-btn">⭮</button>
        <div id="syncStatus" class="sync-status">Sincronizando...</div>
    </div>

    <div class="main-content">
        <div class="card">
            <div class="tabs-header">
                <button class="tab-btn active" id="btn-tab-hours" onclick="switchLeftTab('hours')">⏱ Horas</button>
                <button class="tab-btn" id="btn-tab-projects" onclick="switchLeftTab('projects')">🚀 Proyectos</button>
            </div>

            <div id="tab-hours">
                <form id="timeForm">
                    <input type="hidden" id="editId">
                    <div class="form-group"><label>Fecha</label><input type="date" id="date" required></div>
                    <div class="form-group">
                        <label>Cliente</label>
                        <select id="client" onchange="handleSelectChange('client', 'clientManual')" required></select>
                        <input type="text" id="clientManual" class="manual-input" placeholder="Nombre cliente...">
                    </div>
                    <div class="form-group">
                        <label>Solicitante</label>
                        <select id="requester" onchange="handleSelectChange('requester', 'requesterManual')" disabled required></select>
                        <input type="text" id="requesterManual" class="manual-input" placeholder="Nombre persona...">
                    </div>
                    <div class="form-group"><label>Horas</label><input type="number" id="hours" step="0.5" required></div>
                    <div class="form-group"><label>Tipo</label><select id="type"><option value="Remoto">Remoto</option><option value="Presencial">Presencial</option></select></div>
                    <div class="form-group"><label>Descripción</label><input type="text" id="billingDesc" placeholder="Detalle"></div>
                    <button type="submit" id="submitBtn" class="btn">Guardar Horas ✔</button>
                    <button type="button" id="cancelBtn" onclick="cancelEdit()" class="btn" style="display:none; background:#888; margin-top:5px;">Cancelar</button>
                </form>
            </div>

            <div id="tab-projects" style="display:none;">
                <form id="projectForm">
                    <div class="form-group">
                        <label>Cliente</label>
                        <select id="projectClient" onchange="handleSelectChange('projectClient', 'projectClientManual')" required></select>
                        <input type="text" id="projectClientManual" class="manual-input" placeholder="Nuevo cliente...">
                    </div>
                    <div class="form-group"><label>Presupuesto Horas</label><input type="number" id="projectHours" required></div>
                    <div class="form-group"><label>Fecha Entrega</label><input type="date" id="projectDeadline" required></div>
                    <button type="submit" id="projBtn" class="btn" style="background:var(--cone-black)">Crear Proyecto 🚀</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="tabs-header">
                <button class="tab-btn active" id="btn-view-list" onclick="switchRightView('list')">📋 Listado</button>
                <button class="tab-btn" id="btn-view-calendar" onclick="switchRightView('calendar')">📅 Calendario</button>
            </div>

            <div id="view-list">
                <div style="display:flex; gap:5px; margin-bottom:12px; flex-wrap: wrap;">
                    <select id="fDay" style="width:60px;"><option value="">Día</option></select>
                    <select id="fMonth" style="width:90px;"><option value="">Mes</option><option value="01">Ene</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Abr</option><option value="05">May</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ago</option><option value="09">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dic</option></select>
                    <select id="fYear" style="width:75px;"><option value="2025">2025</option><option value="2026">2026</option></select>
                    <select id="fClient" style="flex:1;"><option value="">Cliente</option></select>
                    <button onclick="generatePDF()" class="btn" style="width:auto; padding:0 10px; background:black;">PDF</button>
                </div>
                <div id="recordsList" style="max-height:500px; overflow-y:auto;"></div>
            </div>

            <div id="view-calendar" style="display:none;">
                <div class="calendar-controls">
                    <button onclick="changeMonth(-1)">❮</button>
                    <b id="calMonthLabel"></b>
                    <button onclick="changeMonth(1)">❯</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNF5pO9cw_Qpn3JeqUz1gH5xjDMuTJygJMekP2QI_cYU10BA65_9xnXxdzEjsuU-23/exec';
    let timeRecords = [];
    let currentCalDate = new Date();

    // Login Persistente
    if(sessionStorage.getItem('cone_auth')) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        loadData();
    }

    function verifyPass() {
        if (document.getElementById('passInput').value === "bejerman23+") {
            sessionStorage.setItem('cone_auth', 'true');
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadData();
        }
    }

    // Inicializar select de días
    const dSel = document.getElementById('fDay');
    for(let i=1; i<=31; i++) { let v = i < 10 ? '0'+i : i; dSel.innerHTML += `<option value="${v}">${v}</option>`; }

    // TABS
    function switchLeftTab(t) {
        document.getElementById('tab-hours').style.display = t==='hours'?'block':'none';
        document.getElementById('tab-projects').style.display = t==='projects'?'block':'none';
        document.getElementById('btn-tab-hours').className = t==='hours'?'tab-btn active':'tab-btn';
        document.getElementById('btn-tab-projects').className = t==='projects'?'tab-btn active':'tab-btn';
    }
    function switchRightView(v) {
        document.getElementById('view-list').style.display = v==='list'?'block':'none';
        document.getElementById('view-calendar').style.display = v==='calendar'?'block':'none';
        document.getElementById('btn-view-list').className = v==='list'?'tab-btn active':'tab-btn';
        document.getElementById('btn-view-calendar').className = v==='calendar'?'tab-btn active':'tab-btn';
        if(v==='calendar') renderCalendar();
    }

    // CARGA DE DATOS
    async function loadData() {
        const ss = document.getElementById('syncStatus');
        ss.style.display = 'block';
        try {
            const res = await fetch(SCRIPT_URL);
            timeRecords = await res.json();
            populateFilters();
            renderList();
            renderCalendar();
            ss.style.display = 'none';
        } catch(e) { ss.innerText = "Error de conexión"; }
    }

    function populateFilters() {
        const clients = [...new Set(timeRecords.map(r => r.cliente))].filter(Boolean).sort();
        const opts = '<option value="">Seleccionar...</option>' + clients.map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="OTRO">➕ NUEVO</option>';
        document.getElementById('client').innerHTML = opts;
        document.getElementById('projectClient').innerHTML = opts;
        document.getElementById('fClient').innerHTML = '<option value="">Todos los Clientes</option>' + clients.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    // LÓGICA DE CAMPOS "OTRO"
    function handleSelectChange(selId, manId) {
        const s = document.getElementById(selId);
        const m = document.getElementById(manId);
        const isOtro = s.value === 'OTRO';
        m.style.display = isOtro ? 'block' : 'none';
        m.required = isOtro;

        if(selId === 'client') {
            const req = document.getElementById('requester');
            req.disabled = !s.value;
            if(s.value && !isOtro) {
                const solis = [...new Set(timeRecords.filter(r => r.cliente === s.value).map(r => r.solicitante))].filter(Boolean);
                req.innerHTML = '<option value="">Solicitante...</option>' + solis.map(x => `<option value="${x}">${x}</option>`).join('') + '<option value="OTRO">➕ NUEVO</option>';
            } else if(isOtro) {
                req.innerHTML = '<option value="OTRO">➕ NUEVO</option>';
                req.dispatchEvent(new Event('change'));
            }
        }
    }

    // LISTADO Y FILTROS
    function renderList() {
        const c = document.getElementById('fClient').value;
        const m = document.getElementById('fMonth').value;
        const d = document.getElementById('fDay').value;
        const y = document.getElementById('fYear').value;

        const filtered = timeRecords.filter(r => {
            if(!r.fecha) return false;
            const p = r.fecha.split('-');
            return (!c || r.cliente === c) && (!y || p[0] === y) && (!m || p[1] === m) && (!d || p[2] === d);
        }).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

        document.getElementById('recordsList').innerHTML = filtered.map(r => `
            <div class="record-item">
                <div class="record-info">
                    <div class="record-client-name">${r.cliente}</div>
                    <div class="record-meta">📅 ${r.fecha.split('-').reverse().join('/')} | 👤 ${r.solicitante}</div>
                    <div class="record-desc">📝${r.descripcion || ''}</div>
                </div>
                <div class="record-side">
                    <span class="record-hours-badge">${r.horas}h</span>
                    <div style="margin-top:5px; opacity:0.3;">
                        <span onclick="prepareEdit('${r.id}')" style="cursor:pointer; margin-right:8px;">✎</span>
                        <span onclick="deleteRecord('${r.id}')" style="cursor:pointer;">🗑</span>
                    </div>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; opacity:0.5;">Sin datos</p>';
    }

    // CALENDARIO
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const y = currentCalDate.getFullYear();
        const m = currentCalDate.getMonth();
        document.getElementById('calMonthLabel').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentCalDate).toUpperCase();

        ['Lun', 'Mar', 'Mie', 'Jue', 'Vie'].forEach(d => grid.innerHTML += `<div class="cal-header">${d}</div>`);

        const first = new Date(y, m, 1).getDay();
        const days = new Date(y, m + 1, 0).getDate();
        let offset = first === 0 ? 6 : first - 1;

        let day = 1;
        for (let i = 0; i < 42; i++) {
            if (day > days) break;
            const dateObj = new Date(y, m, day);
            const w = dateObj.getDay();
            if (w === 0 || w === 6) { day++; i--; continue; }
            if (i < offset && day === 1) { grid.innerHTML += `<div></div>`; continue; }

            const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const dayData = timeRecords.filter(r => r.fecha === dStr);
            const totalH = dayData.reduce((acc, r) => acc + (parseFloat(r.horas) || 0), 0);
            
            let chips = dayData.slice(0, 2).map(r => `<div class="cal-chip">${r.cliente}</div>`).join('');
            if(dayData.length > 2) chips += `<div style="font-size:8px; color:red; font-weight:700;">+${dayData.length-2}</div>`;

            const isToday = new Date().toISOString().split('T')[0] === dStr;
            grid.innerHTML += `<div class="cal-day ${isToday?'today':''}">
                <span class="cal-num">${day}</span>
                <div>${chips}</div>
                ${totalH > 0 ? `<div class="cal-total-hours">${totalH}h</div>` : ''}
            </div>`;
            day++;
        }
    }
    function changeMonth(s) { currentCalDate.setMonth(currentCalDate.getMonth() + s); renderCalendar(); }

    // ENVÍO DE HORAS
    document.getElementById('timeForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = 'GUARDANDO...';
        
        const payload = {
            id: document.getElementById('editId').value,
            action: document.getElementById('editId').value ? "edit" : "save_hours",
            date: document.getElementById('date').value,
            client: document.getElementById('client').value === 'OTRO' ? document.getElementById('clientManual').value.toUpperCase() : document.getElementById('client').value,
            requester: document.getElementById('requester').value === 'OTRO' ? document.getElementById('requesterManual').value : document.getElementById('requester').value,
            hours: document.getElementById('hours').value,
            type: document.getElementById('type').value,
            description: document.getElementById('billingDesc').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            cancelEdit();
            await loadData();
        } catch(e) { alert("Error al guardar"); }
        btn.disabled = false; btn.innerText = 'Guardar Horas ✔';
    };

    // ENVÍO DE PROYECTO
    document.getElementById('projectForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('projBtn');
        btn.disabled = true; btn.innerText = 'CREANDO...';

        const payload = {
            action: "save_project",
            client: document.getElementById('projectClient').value === 'OTRO' ? document.getElementById('projectClientManual').value.toUpperCase() : document.getElementById('projectClient').value,
            hours: document.getElementById('projectHours').value,
            deliveryDate: document.getElementById('projectDeadline').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("🚀 Proyecto Creado");
            this.reset();
            loadData();
        } catch(e) { alert("Error"); }
        btn.disabled = false; btn.innerText = 'Crear Proyecto 🚀';
    };

    // EDICIÓN Y BORRADO
    function prepareEdit(id) {
        const r = timeRecords.find(x => x.id.toString() === id.toString());
        if(!r) return;
        switchLeftTab('hours');
        document.getElementById('editId').value = r.id;
        document.getElementById('date').value = r.fecha;
        document.getElementById('client').value = r.cliente;
        handleSelectChange('client', 'clientManual');
        setTimeout(() => {
            document.getElementById('requester').value = r.solicitante;
            document.getElementById('hours').value = r.horas;
            document.getElementById('billingDesc').value = r.descripcion;
            document.getElementById('submitBtn').innerText = "Actualizar ✔";
            document.getElementById('cancelBtn').style.display = "block";
        }, 100);
    }

    function cancelEdit() {
        document.getElementById('timeForm').reset();
        document.getElementById('editId').value = "";
        document.getElementById('submitBtn').innerText = "Guardar Horas ✔";
        document.getElementById('cancelBtn').style.display = "none";
    }

    async function deleteRecord(id) {
        if(!confirm("¿Borrar registro?")) return;
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "delete", id: id }) });
            await loadData();
        } catch(e) { alert("Error"); }
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const cli = document.getElementById('fClient').value;
        if(!cli) return alert("Selecciona un cliente");
        const data = timeRecords.filter(r => r.cliente === cli);
        doc.text(`REPORTE DE HORAS: ${cli}`, 14, 20);
        doc.autoTable({ startY: 25, head: [['Fecha', 'Descripción', 'Horas']], body: data.map(r => [r.fecha, r.descripcion, r.horas]) });
        doc.save(`Reporte_${cli}.pdf`);
    }

    // Eventos de filtros
    document.querySelectorAll('#view-list select').forEach(s => s.onchange = renderList);
    document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
