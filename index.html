<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Proyectos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 { color: #333; font-size: 2em; margin-bottom: 10px; }
        .sync-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .sync-status.connected { background: #d4edda; color: #155724; }
        .sync-status.syncing { background: #fff3cd; color: #856404; }
        .sync-status.error { background: #f8d7da; color: #721c24; }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .filters {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .records-list { max-height: 500px; overflow-y: auto; }
        .record-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .record-item-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .main-content, .stats-grid, .filters { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Control de Proyectos</h1>
            <div id="syncStatus" class="sync-status syncing">🔄 Conectando...</div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>➕ Registrar</h2>
                <form id="timeForm">
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Cliente</label>
                        <select id="client" required>
                            <option value="">Seleccionar...</option>
                            <option value="ROSSI">ROSSI</option>
                            <option value="NIP">NIP</option>
                            <option value="BROUWER">BROUWER</option>
                            <option value="FONTANELLA">FONTANELLA</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Horas</label>
                        <input type="number" id="hours" step="0.5" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="type">
                            <option value="Remoto">🏠 Remoto</option>
                            <option value="Presencial">🏢 Presencial</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">💾 Guardar</button>
                </form>
            </div>

            <div class="card">
                <h2>📈 Resumen</h2>
                <div class="stats-grid">
                    <div class="stat-card"><h3 id="totalHours">0.0</h3><p>Horas</p></div>
                    <div class="stat-card"><h3 id="totalClients">0</h3><p>Clientes</p></div>
                    <div class="stat-card"><h3 id="totalRecords">0</h3><p>Registros</p></div>
                </div>
                <div class="filters">
                    <select id="fYear"><option value="2026">2026</option><option value="2025">2025</option></select>
                    <select id="fClient"><option value="">Todos</option></select>
                </div>
                <div id="recordsList" class="records-list"></div>
            </div>
        </div>
    </div>

    <script>
        // PEGA TU URL AQUÍ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNF5pO9cw_Qpn3JeqUz1gH5xjDMuTJygJMekP2QI_cYU10BA65_9xnXxdzEjsuU-23/exec'; 
        let timeRecords = [];

        async function load() {
            try {
                const res = await fetch(SCRIPT_URL);
                timeRecords = await res.json();
                document.getElementById('syncStatus').className = 'sync-status connected';
                document.getElementById('syncStatus').innerText = '✅ Conectado';
                render();
                updateFilters();
            } catch (e) {
                document.getElementById('syncStatus').className = 'sync-status error';
                document.getElementById('syncStatus').innerText = '❌ Error de Conexión';
            }
        }

        function render() {
            const year = document.getElementById('fYear').value;
            const client = document.getElementById('fClient').value;
            const container = document.getElementById('recordsList');
            
            const filtered = timeRecords.filter(r => {
                const matchYear = String(r.fecha).includes(year);
                const matchClient = !client || r.cliente === client;
                return matchYear && matchClient;
            });

            container.innerHTML = filtered.map(r => `
                <div class="record-item">
                    <div class="record-item-header">
                        <span>${r.cliente}</span>
                        <span>${r.horas}h</span>
                    </div>
                    <div style="font-size: 0.85em; color: #666; margin-top: 5px;">
                        📅 ${String(r.fecha).split('T')[0]} | ${r.tipo}
                    </div>
                </div>
            `).join('') || 'No hay datos';

            updateStats(filtered);
        }

        function updateStats(data) {
            const totalH = data.reduce((s, r) => s + (parseFloat(r.horas) || 0), 0);
            const totalC = new Set(data.map(r => r.cliente)).size;
            document.getElementById('totalHours').innerText = totalH.toFixed(1);
            document.getElementById('totalClients').innerText = totalC;
            document.getElementById('totalRecords').innerText = data.length;
        }

        function updateFilters() {
            const clients = [...new Set(timeRecords.map(r => r.cliente))].filter(Boolean);
            const select = document.getElementById('fClient');
            select.innerHTML = '<option value="">Todos</option>' + clients.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        document.getElementById('timeForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = '⏳ Guardando...';

            const payload = {
                date: document.getElementById('date').value,
                client: document.getElementById('client').
