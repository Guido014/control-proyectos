<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Proyectos | CONE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --cone-red: #E30613; 
            --cone-black: #1A1A1A;
            --cone-light-gray: #F4F4F4;
            --cone-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Comfortaa', cursive, sans-serif;
            background-color: var(--cone-light-gray);
            color: var(--cone-black);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            background: var(--cone-white); padding: 30px 20px; border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative; border-bottom: 5px solid var(--cone-red);
        }

        .brand-subtitle { color: var(--cone-red); font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }

        #statusWrapper { overflow: hidden; transition: all 0.5s ease; height: 0px; opacity: 0; }
        .sync-status { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px; font-weight: 700; background: #eee; }

        .refresh-btn {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; font-size: 1.8rem;
            opacity: 0.4; transition: 0.3s; color: var(--cone-black);
        }
        .refresh-btn:hover { opacity: 1; color: var(--cone-red); transform: rotate(180deg); }

        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: var(--cone-white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card h2 { font-size: 1.3rem; margin-bottom: 25px; border-left: 5px solid var(--cone-red); padding-left: 15px; text-transform: uppercase; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.8rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-family: 'Comfortaa', sans-serif; cursor: pointer; }
        
        /* Estilo para los inputs de "Otro" */
        .manual-input { margin-top: 8px; border-color: var(--cone-red); display: none; background-color: #fff9f9; }

        .btn { background: var(--cone-red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: var(--cone-black); }

        .btn-pdf { background: var(--cone-black); margin-top: 10px; font-size: 0.8rem; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-pdf:disabled { background: #ccc; cursor: not-allowed; opacity: 0.5; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--cone-black); color: white; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--cone-red); }

        .filters { 
            display: grid; 
            grid-template-columns: 0.6fr 1fr 0.8fr 1.2fr; 
            gap: 8px; 
            margin-bottom: 20px; 
        }
        
        .records-list { 
            min-height: 400px; 
            max-height: 500px; 
            overflow-y: auto; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
        }
        
        .record-item { background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--cone-red); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .record-header { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.9rem; }
        .record-hours { background: var(--cone-black); color: white; padding: 2px 6px; border-radius: 5px; font-size: 0.75rem; }

        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } .filters { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="brand-subtitle">CONSULTORA DE NEGOCIOS EMPRESARIOS</span> 
        <h1>Control de Proyectos</h1>
        <button onclick="loadRecords()" class="refresh-btn">⭮</button>
        <div id="statusWrapper"><div id="syncStatus" class="sync-status">Conectando...</div></div>
    </div>

    <div class="main-content">
        <div class="card">
            <h2>➕ Registrar Horas</h2>
            <form id="timeForm">
                <div class="form-group"><label>Fecha</label><input type="date" id="date" required></div>
                
                <div class="form-group">
                    <label>Cliente</label>
                    <select id="client" required><option value="">Cargando...</option></select>
                    <input type="text" id="clientManual" class="manual-input" placeholder="Nombre de la nueva empresa...">
                </div>

                <div class="form-group">
                    <label>Solicitante</label>
                    <select id="requester" required disabled><option value="">Selecciona cliente...</option></select>
                    <input type="text" id="requesterManual" class="manual-input" placeholder="Nombre de la persona...">
                </div>

                <div class="form-group"><label>Horas</label><input type="number" id="hours" step="0.5" required></div>
                <div class="form-group"><label>Descripción</label><input type="text" id="billingDesc"></div>
                <button type="submit" id="submitBtn" class="btn">Guardar ✔</button>
            </form>
        </div>

        <div class="card">
            <h2>📈 Resumen</h2>
            <div class="stats-grid">
                <div class="stat-card"><h3 id="totalHours">0.0</h3><p style="font-size:9px">HORAS</p></div>
                <div class="stat-card"><h3 id="totalClients">0</h3><p style="font-size:9px">CLIENTES</p></div>
                <div class="stat-card"><h3 id="totalRecords">0</h3><p style="font-size:9px">REGISTROS</p></div>
            </div>

            <button onclick="generatePDF()" id="pdfBtn" class="btn btn-pdf">📄 Descargar Reporte PDF</button>
            <p id="pdfWarning" style="color:red; font-size:10px; text-align:center; margin-top:5px;">Seleccioná un cliente para habilitar el PDF</p>

            <div class="filters" style="margin-top: 20px;">
                <select id="filterDay"><option value="">Día</option></select>
                <select id="filterMonth">
                    <option value="">Mes</option>
                    <option value="01">Enero</option><option value="02">Febrero</option><option value="03">Marzo</option>
                    <option value="04">Abril</option><option value="05">Mayo</option><option value="06">Junio</option>
                    <option value="07">Julio</option><option value="08">Agosto</option><option value="09">Septiembre</option>
                    <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select>
                <select id="filterYear"><option value="2026">2026</option><option value="2025">2025</option></select>
                <select id="filterClient"><option value="">Cliente</option></select>
            </div>
            
            <div id="recordsList" class="records-list">Cargando datos...</div>
        </div>
    </div>
</div>

    // Cargar días del 01 al 31
    const daySelect = document.getElementById('filterDay');
    for(let i=1; i<=31; i++) {
        let val = i < 10 ? '0'+i : i;
        daySelect.innerHTML += `<option value="${val}">${val}</option>`;
    }

    async function loadRecords() {
        const sw = document.getElementById('statusWrapper');
        const ss = document.getElementById('syncStatus');
        sw.style.height = '45px'; sw.style.opacity = '1';
        ss.innerText = '⭮ Sincronizando...';

        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            timeRecords = data.datos || data;
            
            // Asignamos índice de excel para mantener orden LIFO
            timeRecords = timeRecords.map((r, i) => ({...r, excelIndex: i}));

            populateClientFilter();
            renderRecords();
            ss.innerText = '✅ Sincronizado';
            setTimeout(() => { sw.style.height = '0px'; sw.style.opacity = '0'; }, 2000);
        } catch (e) {
            ss.innerText = '❌ Error de conexión';
        }
    }

    function renderRecords() {
        const fClient = document.getElementById('filterClient').value;
        const fMonth = document.getElementById('filterMonth').value;
        const fDay = document.getElementById('filterDay').value;
        const fYear = document.getElementById('filterYear').value;

        const pdfBtn = document.getElementById('pdfBtn');
        const pdfWarning = document.getElementById('pdfWarning');
        
        pdfBtn.disabled = (fClient === "");
        pdfWarning.style.visibility = (fClient === "") ? "visible" : "hidden";

        let filtered = timeRecords.filter(r => {
            const rDate = String(r.fecha);
            return (!fClient || r.cliente === fClient) &&
                   (!fYear || rDate.includes(fYear)) &&
                   (!fMonth || rDate.includes("-" + fMonth + "-")) &&
                   (!fDay || rDate.endsWith("-" + fDay));
        });

        // Orden: Más reciente arriba
        filtered.sort((a, b) => {
            const da = new Date(a.fecha), db = new Date(b.fecha);
            if (db - da !== 0) return db - da;
            return b.excelIndex - a.excelIndex;
        });

        document.getElementById('totalHours').innerText = filtered.reduce((acc, r) => acc + (parseFloat(r.horas) || 0), 0).toFixed(1);
        document.getElementById('totalClients').innerText = new Set(filtered.map(r => r.cliente)).size;
        document.getElementById('totalRecords').innerText = filtered.length;

        document.getElementById('recordsList').innerHTML = filtered.map(r => `
            <div class="record-item">
                <div class="record-header"><span>${r.cliente}</span><span class="record-hours">${r.horas}h</span></div>
                <div style="font-size: 0.75rem; color: #666; margin-top:5px;">
                    📅 ${r.fecha} | 👤 ${r.solicitante}<br>📝 ${r.descripcion}
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#999; font-size:12px;">Sin registros</p>';
    }

    function populateClientFilter() {
        const clients = [...new Set(timeRecords.map(r => r.cliente))].filter(Boolean).sort();
        document.getElementById('filterClient').innerHTML = '<option value="">Cliente</option>' + clients.map(c => `<option value="${c}">${c}</option>`).join('');
        
        // El selector del formulario incluye la opción "Nuevo"
        document.getElementById('client').innerHTML = 
            '<option value="">Seleccionar...</option>' + 
            clients.map(c => `<option value="${c}">${c}</option>`).join('') +
            '<option value="OTRO">➕ NUEVO CLIENTE</option>';
    }

    // Lógica para mostrar inputs manuales
    document.getElementById('client').onchange = function() {
        const val = this.value;
        const cliManual = document.getElementById('clientManual');
        const req = document.getElementById('requester');
        const reqManual = document.getElementById('requesterManual');

        // Mostrar input de nuevo cliente si se elige OTRO
        cliManual.style.display = (val === 'OTRO') ? 'block' : 'none';
        cliManual.required = (val === 'OTRO');

        req.disabled = !val;
        reqManual.style.display = 'none';

        if(val && val !== 'OTRO') {
            const solis = [...new Set(timeRecords.filter(r => r.cliente === val).map(r => r.solicitante))].filter(Boolean).sort();
            req.innerHTML = '<option value="">Seleccionar...</option>' + solis.map(s => `<option value="${s}">${s}</option>`).join('') + '<option value="otro_sol">➕ OTRO...</option>';
        } else if (val === 'OTRO') {
            req.innerHTML = '<option value="otro_sol">➕ INGRESAR SOLICITANTE</option>';
            req.value = "otro_sol";
            req.dispatchEvent(new Event('change'));
        }
    };

    document.getElementById('requester').onchange = function() {
        const reqManual = document.getElementById('requesterManual');
        reqManual.style.display = (this.value === 'otro_sol') ? 'block' : 'none';
        reqManual.required = (this.value === 'otro_sol');
    };

    // ENVÍO DE DATOS
    document.getElementById('timeForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = '⌛ Guardando...';

        // Decidir si usamos el valor del Select o del Input Manual
        let finalClient = document.getElementById('client').value;
        if (finalClient === 'OTRO') finalClient = document.getElementById('clientManual').value;

        let finalSol = document.getElementById('requester').value;
        if (finalSol === 'otro_sol') finalSol = document.getElementById('requesterManual').value;

        const data = {
            date: document.getElementById('date').value,
            client: finalClient.toUpperCase(),
            hours: document.getElementById('hours').value,
            type: "Remoto", // O podés re-agregar el campo de tipo si querés
            requester: finalSol,
            description: document.getElementById('billingDesc').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            this.reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('clientManual').style.display = 'none';
            document.getElementById('requesterManual').style.display = 'none';
            await loadRecords();
        } catch (e) { alert("Error al guardar"); }
        
        btn.disabled = false; btn.innerText = 'Guardar ✔';
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const clientName = document.getElementById('filterClient').value;
        if (!clientName) return;

        doc.setFontSize(24);
        doc.setTextColor(227, 6, 19); 
        doc.text("CONE", 14, 22);
        
        doc.setFontSize(8);
        doc.setTextColor(100);
        doc.text("CONSULTORA DE NEGOCIOS EMPRESARIOS", 14, 32);
        
        doc.setFontSize(14);
        doc.setTextColor(0);
        doc.text(`REPORTE DE ACTIVIDAD: ${clientName}`, 14, 48);

        const fMonth = document.getElementById('filterMonth').value;
        const fDay = document.getElementById('filterDay').value;
        const fYear = document.getElementById('filterYear').value;
        
        const filteredData = timeRecords.filter(r => {
             const rDate = String(r.fecha);
             return (r.cliente === clientName) &&
                    (!fYear || rDate.includes(fYear)) &&
                    (!fMonth || rDate.includes("-" + fMonth + "-")) &&
                    (!fDay || rDate.endsWith("-" + fDay));
        });

        const rows = filteredData.map(r => [r.fecha, r.solicitante, r.descripcion, r.horas + " h"]);

        doc.autoTable({
            startY: 55,
            head: [['Fecha', 'Solicitante', 'Descripción', 'Horas']],
            body: rows,
            headStyles: { fillColor: [26, 26, 26] },
            styles: { fontSize: 9 }
        });

        const total = filteredData.reduce((acc, r) => acc + (parseFloat(r.horas) || 0), 0);
        doc.setFontSize(12);
        doc.setTextColor(227, 6, 19);
        doc.text(`TOTAL HORAS: ${total.toFixed(1)} h`, 14, doc.lastAutoTable.finalY + 12);

        doc.save(`CONE_${clientName}.pdf`);
    }

    document.querySelectorAll('.filters select').forEach(s => s.onchange = renderRecords);
    document.getElementById('date').valueAsDate = new Date();
    loadRecords();
</script>
